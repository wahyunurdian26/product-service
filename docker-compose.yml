version: '3.8'

services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: superindo
    ports:
      - "5432:5432"
    volumes:
      - ./db/migrations/000001_create_products_table.up.sql:/docker-entrypoint-initdb.d/1_init.sql
      - ./db/seeds/products_seed.sql:/docker-entrypoint-initdb.d/2_seed.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: 8080
      DATABASE_DSN: postgres://postgres:password@db:5432/superindo?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ""
    depends_on:
      - db
      - redis
